name: riverpod3_starter
description: "Flutter + Riverpod 3 starter kit."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^3.1.0
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.6.1
  pretty_dio_logger: ^1.4.0
  riverpod_annotation: ^3.0.3
  shared_preferences: ^2.5.3

dev_dependencies:
  build_runner: ^2.5.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  freezed: ^3.2.0
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/mocks/
